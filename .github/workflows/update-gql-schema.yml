name: Update GQL Schema
run-name: Nightly GQL schema update
on:
  schedule:
    # Every night at 03:00 UTC
    - cron: '0 3 * * *'
  # Allow manual triggering from the Actions tab
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  # Needed to post the required `build` commit status on the PR head commit.
  statuses: write

jobs:
  update-gql:
    runs-on:
      - runs-on
      - runner=sm
      - env=production-eu
      - run-id=${{ github.run_id }}
      - tag=update-gql-schema
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install Node (needed by @apollo/rover for fetch-schema)
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Fetch GraphQL schema
        run: make fetch-schema
        env:
          COLLIBRA_URL: ${{ secrets.COLLIBRA_URL }}
          COLLIBRA_USERNAME: ${{ secrets.COLLIBRA_USER }}
          COLLIBRA_PASSWORD: ${{ secrets.COLLIBRA_PASSWORD }}
          GRAPHQL_PATH: "/query"

      - name: Regenerate GraphQL code
        run: make gql

      # Skip validation + PR creation entirely when the schema didn't change.
      - name: Detect changes
        id: detect
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No schema or generated-code changes detected; nothing to do."
          fi

      # Validate the regenerated code in-place (shared with validate.yml).
      # continue-on-error so the PR is still opened on failure, with the
      # `build` status reporting red (see "Report build status").
      - name: Build, lint and test
        id: validate
        if: steps.detect.outputs.changed == 'true'
        continue-on-error: true
        uses: ./.github/actions/validate-sdk
        with:
          collibra-url: ${{ secrets.COLLIBRA_URL }}
          collibra-user: ${{ secrets.COLLIBRA_USER }}
          collibra-password: ${{ secrets.COLLIBRA_PASSWORD }}

      - name: Create or update pull request
        id: cpr
        if: steps.detect.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          # Built-in token (org secrets are unavailable on this public repo).
          # sign-commits signs as github-actions[bot] to satisfy the org
          # "Require Signed Commits" ruleset on the automation/* branch.
          token: ${{ secrets.GITHUB_TOKEN }}
          sign-commits: true
          # A stable branch so an open PR is updated instead of duplicated
          branch: automation/update-gql-schema
          base: main
          commit-message: 'chore(gql): update GraphQL schema and generated code'
          title: 'chore(gql): update GraphQL schema'
          body: |
            Automated update of the GraphQL schema and generated code.

            Generated by the nightly **Update GQL Schema** workflow
            (`.github/workflows/update-gql-schema.yml`), which runs:

            ```
            make fetch-schema
            make gql
            ```

            It is refreshed on every run, so the diff always reflects the latest schema.
          labels: |
            automated
            gql
          delete-branch: true

      # `main` requires a `build` status check, but PRs opened with GITHUB_TOKEN
      # don't trigger validate.yml, and workflow_dispatch check runs are excluded
      # from a PR's required-check evaluation. So report the inline validation
      # result as a `build` commit status on the PR head commit, which the
      # required check matches by context name.
      - name: Report build status
        if: steps.detect.outputs.changed == 'true' && steps.cpr.outputs.pull-request-head-sha != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ steps.cpr.outputs.pull-request-head-sha }}
          VALIDATION_OUTCOME: ${{ steps.validate.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$VALIDATION_OUTCOME" = "success" ]; then
            state=success
            description="Build, lint and tests passed"
          else
            state=failure
            description="Validation failed - see the workflow run"
          fi
          gh api "repos/${GITHUB_REPOSITORY}/statuses/${HEAD_SHA}" \
            -f state="$state" \
            -f context=build \
            -f target_url="$RUN_URL" \
            -f description="$description"

      # Arm auto-merge so the PR merges itself once the required `build` check
      # is green and the code-owner review is approved. Only when validation
      # passed, so a failing build never auto-merges.
      - name: Enable auto-merge
        if: steps.detect.outputs.changed == 'true' && steps.validate.outcome == 'success' && steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" --auto --squash --repo "${{ github.repository }}"

      - name: Report result
        if: steps.detect.outputs.changed == 'true'
        run: |
          echo "PR #${{ steps.cpr.outputs.pull-request-number }} -> ${{ steps.cpr.outputs.pull-request-operation }} (build: ${{ steps.validate.outcome }})"
