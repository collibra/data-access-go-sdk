name: Update GQL Schema
run-name: Nightly GQL schema update
on:
  schedule:
    # Every night at 03:00 UTC
    - cron: "0 3 * * *"
  # Allow manual triggering from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-gql:
    runs-on:
      - runs-on
      - runner=sm
      - env=production-eu
      - run-id=${{ github.run_id }}
      - tag=update-gql-schema
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install Node (needed by @apollo/rover for fetch-schema)
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Fetch GraphQL schema
        run: make fetch-schema
        env:
          COLLIBRA_URL: ${{ secrets.COLLIBRA_URL }}
          COLLIBRA_USERNAME: ${{ secrets.COLLIBRA_USER }}
          COLLIBRA_PASSWORD: ${{ secrets.COLLIBRA_PASSWORD }}
          GRAPHQL_PATH: "/query"

      - name: Regenerate GraphQL code
        run: make gql

      - name: Verify it still builds
        run: go build ./...

      - name: Import GPG key
        # Fails loud if either secret is empty. No unsigned-tag fallback.
        uses: crazy-max/ghaction-import-gpg@v6.3.0
        with:
          gpg_private_key: ${{ secrets.CICD_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.CICD_GPG_PASSPHRASE }}
          trust_level: 5
          git_user_signingkey: true
          git_tag_gpgsign: true

      - name: Configure git identity
        run: |
          git config user.name collibra-cicd
          git config user.email cicd@collibra.com
        shell: bash

      - name: Create or update pull request
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ secrets.COLLIBRA_GITHUB_TOKEN }}
          # A stable branch so an open PR is updated instead of duplicated
          branch: automation/update-gql-schema
          base: main
          commit-message: "chore(gql): update GraphQL schema and generated code"
          title: "chore(gql): update GraphQL schema"
          body: |
            Automated update of the GraphQL schema and generated code.

            This PR was generated by the nightly **Update GQL Schema** workflow
            (`.github/workflows/update-gql-schema.yml`), which runs:

            ```
            make fetch-schema
            make gql
            ```

            It is refreshed on every run, so the diff always reflects the latest schema.
          labels: |
            automated
            gql
          delete-branch: true
