name: Validate Collibra Data Access SDK
run-name: Validation of Collibra Data Access SDK
on:
  push:
    branches:
      - 'main'
  pull_request:
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    runs-on:
      - runs-on
      - runner=md
      - env=production-eu
      - run-id=${{ github.run_id }}
      - tag=validation-build
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Mod Tidy
        run: go mod tidy

      - name: Build, lint and test
        uses: ./.github/actions/validate-sdk
        with:
          collibra-url: ${{ secrets.COLLIBRA_URL }}
          collibra-user: ${{ secrets.COLLIBRA_USER }}
          collibra-password: ${{ secrets.COLLIBRA_PASSWORD }}

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703  # v5
        if: vars.SONAR_SKIP != 'TRUE' && (github.event_name == 'pull_request' || github.event_name == 'push')
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_PUBLIC_API_KEY }}
          SONAR_HOST_URL: https://sonarqube.collibra.dev
        with:
          args: >
            -Dsonar.pullrequest.github.repository=collibra/data-access-go-sdk

      - name: SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@d304d050d930b02a896b0f85935344f023928496  # v1.1.0
        if: vars.SONAR_SKIP != 'TRUE' && (github.event_name == 'pull_request' || github.event_name == 'push')
        timeout-minutes: 10
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_PUBLIC_API_KEY }}
          SONAR_HOST_URL: https://sonarqube.collibra.dev

      - name: FOSSA Scan
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        uses: fossas/fossa-action@ff70fe9fe17cbd2040648f1c45e8ec4e4884dcf3  # v1
        with:
          api-key: ${{ secrets.FOSSA_PUBLIC_API_KEY }}