name: Release Collibra Data Access SDK
run-name: Running Release for Collibra Data Access SDK
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on:
      - runs-on
      - runner=sm
      - env=production-eu
      - run-id=${{ github.run_id }}
      - tag=release
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Get tag
        id: tag
        run: echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Current tag
        run: echo "Current tag ${{steps.tag.outputs.tag}}"

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Mod Tidy
        run: go mod tidy

      - name: Publish package
        run: GOPROXY=proxy.golang.org go list -m github.com/collibra/data-access-go-sdk@${{steps.tag.outputs.tag}}