fragment AccessControl on AccessControl {
    id
    isSample
    createdAt
    modifiedAt
    name
    namingHint
    state
    action

    category {
        ...GrantCategory
    }

    description
    policyRule
    external
    whatType
    whatAbacRule {
        ... WhatAbacRule
    }

    whoType
    whoAbacRule {
        ... WhoAbacRule
    }

    notInternalizable
    complete
    locks {
        ...AccessControlLockData
    }

    syncData {
       ...SyncData
    }
}

fragment SyncData on SyncData {
    dataSource {
       ...DataSource
    }
    accessControlType {
		type
	}
    actualName
    maskType {
        ... MaskType
    }
    syncStatus
}

fragment AccessControlLockData on AccessControlLockData {
    lockKey
    details {
        ... AccessControlLockDetails
    }
}

fragment AccessControlLockDetails on AccessControlLockDetails {
    reason
}

fragment WhoAbacRule on WhoAbacRule {
    promiseDuration
    type
    ruleJson

}

fragment WhatAbacRule on WhatAbacRule {
    permissions
    globalPermissions
    doTypes
    ruleJson
}

fragment AccessControlConnection on AccessControlConnection {
    ... on AccessControlConnection {
        pageInfo {
            ... PageInfo
        }
        edges {
            cursor
            node {
                ...AccessControl
            }
        }
    }
}

fragment AccessControlConnectionResult on AccessControlConnectionResult {
    ... AccessControlConnection
    ... PermissionDeniedError
    ... InvalidInputError
    ... NotFoundError
}

fragment AccessWhatDataObjectItem on AccessWhatDataObjectItem {
    dataObject {
        ...DataObject
    }
    globalPermissions
    permissions
}

fragment AccessWhatAccessControlItem on AccessWhatAccessControlItem {
    accessControl {
        ... AccessControl
    }
    expiresAt
}

fragment AccessWhatDataObjectItemConnection on AccessWhatDataObjectItemConnection {
    pageInfo {
        ...PageInfo
    }
    edges {
        cursor
        node {
            ...AccessWhatDataObjectItem
        }
    }
}

fragment AccessWhatAccessControlItemConnection on AccessWhatAccessControlItemConnection {
    pageInfo {
        ... PageInfo
    }
    edges {
        cursor
        node {
            ... AccessWhatAccessControlItem
        }
    }
}

fragment AccessWhatAccessControlItemConnectionResult on AccessWhatAccessControlItemConnectionResult {
    ... AccessWhatAccessControlItemConnection
    ... PermissionDeniedError
    ... NotFoundError
    ... InvalidInputError
}

fragment AccessWhoItem on AccessWhoItem {
    expiresAt
    promiseDuration
    type
    item {
        ... on AccessControl {
            id
            name
        }
        ... on Group {
            name
            id
            identityStore {
                id
                name
            }
        }
        ... on User {
            ...User
        }
    }
}

fragment AccessWhoItemConnection on AccessWhoItemConnection {
    pageInfo {
        ...PageInfo
    }
    edges {
        cursor
        node {
            ...AccessWhoItem
        }
    }
}

mutation CreateAccessControl($ap: AccessControlInput!) {
    createAccessControl(input: $ap, enableAdditionalAccessRequests: false) {
        __typename
        ... AccessControl
        ... on AccessControlWithOptionalAccessRequests {
            accessControl {
                ...AccessControl
            }
        }
        ... PermissionDeniedError
        ... InvalidInputError
    }
}

mutation UpdateAccessControl($id: ID!, $ap: AccessControlInput!, $overrideLocks: Boolean) {
    updateAccessControl(id: $id, input: $ap, enableAdditionalAccessRequests: false, overrideLocks: $overrideLocks) {
        __typename
        ...AccessControl
        ... on AccessControlWithOptionalAccessRequests {
            accessControl {
                ... AccessControl
            }
        }
        ... PermissionDeniedError
        ... InvalidInputError
        ... NotFoundError
    }
}

mutation DeleteAccessControl($id: ID!, $overrideLocks: Boolean) {
    deleteAccessControl(id: $id, overrideLocks: $overrideLocks) {
        __typename
        ...AccessControl
        ... NotFoundError
        ... PermissionDeniedError
        ... InvalidInputError
    }
}

mutation ActivateAccessControl($id: ID!) {
    activateAccessControl(id: $id) {
        ...AccessControl
        ...NotFoundError
        ...PermissionDeniedError
        ...InvalidInputError
    }
}

mutation DeactivateAccessControl($id: ID!) {
    deactivateAccessControl(id: $id) {
        ...AccessControl
        ...NotFoundError
        ...PermissionDeniedError
        ...InvalidInputError
    }
}

query GetAccessControl($id: ID!) {
    accessControl(id: $id) {
        __typename
        ... AccessControl
        ... PermissionDeniedError
        ... NotFoundError
        ... InvalidInputError
    }
}

query ListAccessControls($after: String, $limit: Int, $filter: AccessControlFilterInput, $order: [AccessControlOrderByInput!]) {
    accessControls(after: $after, limit: $limit, filter: $filter, order: $order) {
        ... AccessControlConnectionResult
    }
}

query GetAccessControlWhatDataObjectList($id: ID!, $after: String, $limit: Int, $filter: AccessWhatFilterInput, $order: [AccessWhatOrderByInput!]) {
    accessControl(id: $id) {
        ... on AccessControl {
            whatDataObjects(after: $after, limit: $limit, filter: $filter, order: $order) {
                __typename
                ...AccessWhatDataObjectItemConnection
                ... PermissionDeniedError
            }
        }
        ... PermissionDeniedError
        ... NotFoundError
    }
}

query GetAccessControlWhatAccessControls($id: ID!, $after: String, $limit: Int, $order: [AccessWhatOrderByInput!], $filter: AccessControlWhatAccessControlFilterInput) {
    accessControl(id: $id) {
        ... on AccessControl {
            whatAccessControls(after: $after, limit: $limit, filter: $filter, order: $order) {
                __typename
                ...AccessWhatAccessControlItemConnectionResult
                ...PermissionDeniedError
            }
        }
        ...PermissionDeniedError
        ...NotFoundError
    }
}

query GetAccessControlWhoList($id: ID!, $after: String, $limit: Int, $search: String, $order: [AccessControlWhoOrderByInput!]) {
    accessControl(id: $id) {
        ... on AccessControl {
            whoList(after: $after, limit: $limit, search: $search, order: $order) {
                __typename
                ...AccessWhoItemConnection
                ... PermissionDeniedError
            }
        }
        ... PermissionDeniedError
        ... NotFoundError
    }
}

query ListAccessControlAbacWhatScope($id: ID!, $after: String, $limit: Int, $search: String, $order: [AccessWhatOrderByInput!]) {
    accessControl(id: $id) {
        ... on AccessControl {
            whatAbacScope(after: $after, limit: $limit, search: $search, order: $order) {
                ... DataObjectConnection
                ... PermissionDeniedError
            }
        }
        ... PermissionDeniedError
        ... NotFoundError
    }
}