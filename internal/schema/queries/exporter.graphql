fragment StartExportFlow on StartExportFlow {
    flowId
    lastSequenceId
    startTime
}

fragment ExportWhoItem on ExportWhoItem {
    users
    inheritFrom
    recipients
}

fragment ExportDataObjectReference on ExportDataObjectReference {
    id
    fullName
    type
}

fragment ExportWhatItem on ExportWhatItem {
    dataObject {
        ... ExportDataObjectReference
    }
    permissions
}

fragment ExportOwner on ExportOwner {
    email
    accountName
    accessControlName
}

fragment ExportAccessControl on ExportAccessControl {
    id
    name
    description
    namingHint
    externalId
    who {
        ... ExportWhoItem
    }
    deletedWho {
        ... ExportWhoItem
    }
    action
    delete
    whoLocked
    whatLocked
    inheritanceLocked
    deleteLocked
    actualName
    what {
        ... ExportWhatItem
    }
    deleteWhat {
        ... ExportWhatItem
    }
    type
    filterCriteria
    policyRule
    commonDataObject
    owners {
        ... ExportOwner
    }
}

fragment ExportColumnMask on ExportColumnMask {
    columnMaskReferences {
        column {
            ... ExportDataObjectReference
        }
        externalId
        id
    }
    maskDetails {
        id
        deleted
        description
        name
        namingHint
        type
    }
    delete
    who {
        ... ExportWhoItem
    }
    deletedWho {
        ... ExportWhoItem
    }
}

fragment ExportedItem on ExportedItem {
    ... ExportAccessControl
    ... ExportColumnMask
}

fragment ExportAccessControls on ExportAccessControls {
    lastSequenceId
    accessControls {
        ...ExportedItem
    }
}

query FetchExportAccessControls($flowId: UUID!, $after: Int) {
    fetchExportAccessControls(flowId: $flowId, after: $after) {
        ... ExportAccessControls
        ... PermissionDeniedError
        ... NotFoundError
        ... InvalidInputError
    }
}

mutation TriggerExportFlow($flowId: UUID!, $options: ExportFlowOptions!) {
    startExportFlow(flowId: $flowId, options: $options) {
        ... StartExportFlow
        ... PermissionDeniedError
        ... NotFoundError
        ... InvalidInputError
    }
}

mutation FinalizeExportFlow($flowId: UUID!, $startTime: Time!) {
    finishExportFlow(flowId: $flowId, startTime: $startTime)
}