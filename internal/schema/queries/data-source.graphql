fragment DataSource on DataSource {
    id
    name
    type
    description
    createdAt
    modifiedAt
    description
    parent {
        id
    }
    edgeSiteInfo {
        ... on DataSourceLinkedEdgeSiteInfo {
            edgeSiteId
            edgeConnectionId
        }
    }
}

fragment MaskType on MaskType {
    externalId
    displayName
    description
    dataTypes
}

fragment MaskingMetadata on MaskingMetadata {
    defaultMaskExternalName
    maskTypes {
        ... MaskType
    }
}

fragment DataSourceConnection on DataSourceConnection {
    pageInfo {
        ... PageInfo
    }
    edges {
        cursor
        node {
            ... DataSource
        }
    }
}

fragment DataSourceConnectionResult on DataSourceConnectionResult {
    ... DataSourceConnection
    ... PermissionDeniedError
    ... NotFoundError
    ... InvalidInputError
}

query GetDataSource($id: ID!) {
    dataSource(id: $id) {
        ... DataSource
        ... PermissionDeniedError
        ... NotFoundError
    }
}

query ListDataSources($after: String, $limit: Int, $filter: DataSourceFilterInput, $order: [DataSourceOrderByInput!]) {
    dataSources(after: $after, limit: $limit, filter: $filter, order: $order) {
        ... DataSourceConnectionResult
    }
}

query DataSourceMaskInformation($id: ID!) {
    dataSource(id: $id) {
        ... on DataSource {
            maskingMetadata {
                ...MaskingMetadata
            }
        }
        ... PermissionDeniedError
        ... NotFoundError
    }
}

mutation CreateDataSource($input: DataSourceInput!) {
    createDataSource(input: $input) {
        ... PermissionDeniedError
        ... NotFoundError
        ...DataSource
    }
}

mutation UpdateDataSource($id: ID!, $input: DataSourceInput!) {
    updateDataSource(id: $id, input: $input) {
        ... PermissionDeniedError
        ... NotFoundError
        ... DataSource
    }
}

mutation DeleteDataSource($id: ID!) {
    deleteDataSource(id: $id) {
        ... PermissionDeniedError
        ... on DeleteDataSource {
            success
        }
    }
}

mutation SetDataSourceMetadata($dsID: ID!, $input: DataSourceMetaDataInput!) {
    setDataSourceMetaData(id: $dsID, input: $input) {
        ... DataSource
        ... PermissionDeniedError
        ... NotFoundError
        ... InvalidInputError
    }
}

mutation SetSyncConfigurationParameterValues($input: SyncParameterValuesInput!) {
    setSyncConfigurationParameterValues(input: $input) {
        ... DataSource
        ... PermissionDeniedError
        ... NotFoundError
        ... InvalidInputError
    }
}

mutation TriggerDataSourceCliSync($request: DataSourceSyncRequest!) {
    triggerDataSourceCliSync(request: $request) {
        ... DataSource
        ... PermissionDeniedError
        ... NotFoundError
        ... InvalidInputError
    }
}