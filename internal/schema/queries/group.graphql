fragment Group on Group {
    id
    name
    description
}

fragment GroupConnection on GroupConnection {
    pageInfo {
        ... PageInfo
    }
    edges {
        cursor
        node {
            ... Group
        }
    }
}

fragment GroupConnectionResult on GroupConnectionResult {
    ... GroupConnection
    ... NotFoundError
    ... InvalidInputError
    ... PermissionDeniedError
}

query GetGroup($id: ID!) {
    group(id: $id) {
        ... Group
    }
}

query ListGroups($after: String, $limit: Int, $filter: GroupFilterInput, $order: [GroupOrderByInput!]) {
    groups(after: $after, limit: $limit, filter: $filter, order: $order) {
        ... GroupConnectionResult
    }
}