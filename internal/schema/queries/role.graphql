fragment Role on Role {
    id
    description
    name
}

fragment RoleAssignment on RoleAssignment {
    id
    role {
        ...Role
    }
    on {
        ... on AccessControl {
            id
        }
        ... on DataSource {
            id
        }
        ... on DataObject {
            id
        }
        ... NotFoundError
    }
    to {
        ... on User {
            id
        }
        ... on AccessControl {
            id
        }
    }
}

fragment RoleAssignmentConnection on RoleAssignmentConnection {
    pageInfo {
        ...PageInfo
    }
    edges {
        cursor
        node {
            ...RoleAssignment
        }
    }
}

fragment RoleAssignmentConnectionResult on RoleAssignmentConnectionResult {
    ... RoleAssignmentConnection
    ... NotFoundError
    ... InvalidInputError
    ... PermissionDeniedError
}

query GetRole($id: ID!) {
    role(id: $id) {
      ...Role
    }
}

query ListRoleAssignments($after: String, $limit: Int, $filter: RoleAssignmentFilterInput, $order: [RoleAssignmentOrderInput!]) {
    roleAssignments(after: $after, limit: $limit, filter: $filter, order: $order) {
        ... RoleAssignmentConnectionResult
    }
}

query ListRoleAssignmentsOnDataObject($doId: ID!, $after: String, $limit: Int, $filter: RoleAssignmentFilterInput, $order: [RoleAssignmentOrderInput!]) {
    dataObject(id: $doId) {
        roleAssignments(after: $after, limit: $limit, filter: $filter, order: $order) {
           ... RoleAssignmentConnectionResult
        }
    }
}

query ListRoleAssignmentsOnDataSource($dsId: ID!, $after: String, $limit: Int, $filter: RoleAssignmentFilterInput, $order: [RoleAssignmentOrderInput!]) {
    dataSource(id: $dsId) {
        ... on DataSource {
            roleAssignments(after: $after, limit: $limit, filter: $filter, order: $order) {
                ... RoleAssignmentConnectionResult
            }
        }
        ... PermissionDeniedError
        ... NotFoundError
    }
}

query ListRoleAssignmentsOnAccessControl($apId: ID!, $after: String, $limit: Int, $filter: RoleAssignmentFilterInput, $order: [RoleAssignmentOrderInput!]) {
    accessControl(id: $apId) {
        ... on AccessControl {
            roleAssignments(after: $after, limit: $limit, filter: $filter, order: $order) {
                ... RoleAssignmentConnectionResult
            }
        }
        ... PermissionDeniedError
        ... NotFoundError
    }
}

query ListRoleAssignmentsOnUser($userId: ID!, $after: String, $limit: Int, $filter: RoleAssignmentFilterInput, $order: [RoleAssignmentOrderInput!]) {
    user(id: $userId) {
        ... on User {
            roleAssignments(after: $after, limit: $limit, filter: $filter, order: $order) {
                ... RoleAssignmentConnectionResult
            }
        }
        ...InvalidInputError
        ...InvalidEmailError
        ...PermissionDeniedError
        ...NotFoundError
    }
}

mutation UpdateRoleAssigneesOnDataObject($doId: ID!, $roleID: ID!, $assignees: [ID!]!) {
    updateRoleAssigneesOnDataObject(dataObject: $doId, roleInput: {roleID: $roleID, assignees: $assignees}) {
       ... Role
       ... PermissionDeniedError
       ... NotFoundError
    }
}

mutation UpdateRoleAssigneesOnDataSource($dsId: ID!, $roleID: ID!, $assignees: [ID!]!) {
    updateRoleAssigneesOnDataSource(dataSource: $dsId, roleInput: {roleID: $roleID, assignees: $assignees}) {
      ... Role
      ... PermissionDeniedError
      ... NotFoundError
    }
}

mutation UpdateRoleAssigneesOnAccessControl($apId: ID!, $roleID: ID!, $assignees: [ID!]!) {
    updateRoleAssigneesOnAccessControl(accessControl: $apId, roleInput: {roleID: $roleID, assignees: $assignees}) {
       ... Role
       ... PermissionDeniedError
       ... NotFoundError
    }
}