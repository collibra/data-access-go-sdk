fragment Permission on Permission {
    name
    description
}

fragment DataObject on DataObject {
    id
    name
    fullName
    type
    dataType
    deleted
    description
    dataSource {
        id
    }
    applicablePermissions {
        ... Permission
    }
}

fragment DataObjectConnection on DataObjectConnection {
    pageInfo {
        ...PageInfo
    }
    edges {
        cursor
        node {
            ... DataObject
        }
    }
}

fragment DataObjectConnectionResult on DataObjectConnectionResult {
    ... DataObjectConnection
    ... PermissionDeniedError
    ... NotFoundError
    ... InvalidInputError
}

query GetDataObject($dataObjectId: ID!) {
    dataObject(id: $dataObjectId) {
        ... DataObject
    }
}

query ListDataObjects($after: String, $limit: Int, $filter: DataObjectFilterInput, $order: [DataObjectOrderByInput!]) {
    dataObjects(after: $after, limit: $limit, filter: $filter, order: $order) {
        ... DataObjectConnectionResult
    }
}

fragment GroupedDataAccessReturnItem on GroupedDataAccessReturnItem {
    permissions
    globalPermissions
    expiresAt
    user {
        ...User
    }
    nearestAccessControls {
        ...AccessControlSummary
    }
}

fragment GroupedDataAccessReturnItemConnection on GroupedDataAccessReturnItemConnection {
    pageInfo {
        ...PageInfo
    }
    edges {
        cursor
        node {
            ...GroupedDataAccessReturnItem
        }
    }
}

fragment GroupedDataAccessReturnItemConnectionResult on GroupedDataAccessReturnItemConnectionResult {
    ...GroupedDataAccessReturnItemConnection
    ...PermissionDeniedError
    ...NotFoundError
    ...InvalidInputError
}

query GetDataObjectAccessList(
    $dataObjectId: ID!,
    $after: String,
    $limit: Int,
    $filter: AccessFilterInput,
    $order: [DataAccessReturnItemOrderByInput!]
) {
    dataObject(id: $dataObjectId) {
        distinctAccess(after: $after, limit: $limit, filter: $filter, order: $order) {
            __typename
            ...GroupedDataAccessReturnItemConnectionResult
        }
    }
}

query DataObjectByExternalId($fullname: String!, $dataSourceId: ID!, $includeDataSource: Boolean!) {
    dataObjects(filter: {
        fullNames: [$fullname]
        dataSources: [$dataSourceId]
        includeDataSource: $includeDataSource
    }) {
        ... on DataObjectConnection {
            edges {
                node {
                    ... DataObject
                }
            }
        }
        ... NotFoundError
        ... InvalidInputError
        ... PermissionDeniedError
    }
}