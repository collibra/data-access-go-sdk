fragment User on User {
    id
    name
    email
    type
}

query GetUser($id: ID!) {
    user(id: $id) {
        ...User
        ...NotFoundError
        ...PermissionDeniedError
        ...InvalidInputError
    }
}

query CurrentUser {
    currentUser {
        ...User
    }
}

query GetUserByEmail($email: String!) {
    userByEmail(email: $email) {
        ... User
        ... PermissionDeniedError
        ... NotFoundError
    }
}

mutation CreateUser($input: UserInput!) {
    createUser(input: $input) {
        ... User
        ... PermissionDeniedError
        ... NotFoundError
    }
}

mutation UpdateUser($uId: ID!, $input: UserInput!) {
    updateUser(id: $uId, input: $input) {
        ... User
        ... PermissionDeniedError
        ... NotFoundError
    }
}

# MCP
fragment UserConnection on UserConnection {
    edges {
        node {
            ... User
        }
        cursor
    }
    pageInfo {
        startCursor
        hasNextPage
    }
}

query SearchUsers($after: String, $limit: Int, $filter: UserFilterInput) {
    users(after: $after, limit: $limit, filter: $filter) {
        ... UserConnection
        ... PermissionDeniedError
        ... InvalidInputError
    }
}
