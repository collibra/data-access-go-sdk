fragment User on User {
    id
    name
    email
    type
}

query GetUser($id: ID!) {
    user(id: $id) {
        ...User
        ...NotFoundError
        ...PermissionDeniedError
        ...InvalidInputError
    }
}

query CurrentUser {
    currentUser {
        ...User
    }
}

query GetUserByEmail($email: String!) {
    userByEmail(email: $email) {
        ... User
        ... PermissionDeniedError
        ... NotFoundError
    }
}

mutation CreateUser($input: UserInput!) {
    createUser(input: $input) {
        ... User
        ... PermissionDeniedError
        ... NotFoundError
    }
}

mutation UpdateUser($uId: ID!, $input: UserInput!) {
    updateUser(id: $uId, input: $input) {
        ... User
        ... PermissionDeniedError
        ... NotFoundError
    }
}

fragment UserConnection on UserConnection {
    pageInfo {
        ...PageInfo
    }
    edges {
        cursor
        node {
            ... User
        }
    }
}

fragment UserConnectionResult on UserConnectionResult {
    ... UserConnection
    ... PermissionDeniedError
    ... NotFoundError
    ... InvalidInputError
}

query ListUsers($after: String, $limit: Int, $filter: UserFilterInput, $order: [UserOrderByInput!]) {
    users(after: $after, limit: $limit, filter: $filter, order: $order) {
        ... UserConnectionResult
    }
}
