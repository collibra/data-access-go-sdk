# Default genqlient config; for full documentation see:
# https://github.com/Khan/genqlient/blob/main/docs/genqlient.yaml
schema:
- schema.graphql
operations:
- queries/*.graphql
generated: generated.go

# create pointer type for the optional inputs
optional: pointer_omitempty

bindings:
  Time:
    type: time.Time
  Duration:
    type: int64
  UUID:
    type: github.com/google/uuid.UUID
  SyncConfiguration:
    type: map[string]interface{}
    marshaler: github.com/collibra/data-access-go-sdk/internal/scalar.MarshalSyncConfiguration
    unmarshaler: github.com/collibra/data-access-go-sdk/internal/scalar.UnmarshalSyncConfiguration
  SemVer:
    type: github.com/collibra/data-access-go-sdk/types/version.Version
    marshaler: github.com/collibra/data-access-go-sdk/types/version.MarshalVersion
    unmarshaler: github.com/collibra/data-access-go-sdk/types/version.UnmarshalVersion
  Any:
    type: interface{}